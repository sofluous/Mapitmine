<!DOCTYPE html>
<html lang="en" data-accent="cyan">

<head>
    <meta charset="UTF-8">
    <title>Mapitmine</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/iconoir@latest/css/iconoir.css">
    <style>
        /* ============================================================================
 MapItMine â€” Tokenized, Theme-Ready Styles (drop-in paste-over)
 - Switch via [data-theme="light|dark"] and [data-accent="cyan|magenta|amber|lime|black|white"]
 - Sizing/radii/layout preserved from your current CSS
============================================================================ */

        /* 0) App primitives (sizes/radii/fonts) â€” unchanged from your setup */
        :root {
            /* Spacing & type */
            --space-xs: 4px;
            --space-sm: 6px;
            --space-md: 10px;
            --space-lg: 16px;

            --font-sm: 10px;
            --font-base: 12px;
            --font-md: 12px;

            --font-ui: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, "Noto Sans", "Helvetica Neue", Arial, sans-serif;

            /* Radius / inputs */
            --input-radius: 4px;
            --panel-radius: 2px;
            --input-padding: 6px;

            /* Shadows */
            --shadow-sm: 0 1px 1px rgba(0, 0, 0, .06);
            --shadow-md: 0 4px 14px rgba(0, 0, 0, .08);
            --glow-panel: 16%;
            --glow-text: 14%;
            --glow-border: 20%;

            /* Back-compat aliases used by a few rules below */
            --bg-header: var(--color-panel);
            --border-color: var(--color-border);
            --bg-selected: var(--ui-surface-active);
        }

        /* 1) Accent families (Bonsai-compatible) */
        :root[data-accent="cyan"] {
            --accent-100: #e4fff8;
            --accent-200: #cafff1;
            --accent-300: #a7ffe9;
            --accent-400: #5df0c9;
            --accent-500: #38ffd8;
            --accent-600: #1ce3bf;
            --accent-700: #12b69b;
            --accent-800: #0b8d78;
            --accent-900: #0a6d5d;
            --accent-on: #021a16;
        }

        :root[data-accent="magenta"] {
            --accent-100: #fff1fb;
            --accent-200: #ffd5f5;
            --accent-300: #ffc4f6;
            --accent-400: #ff86f0;
            --accent-500: #ff5bea;
            --accent-600: #e544d1;
            --accent-700: #c22eb1;
            --accent-800: #97238a;
            --accent-900: #701a67;
            --accent-on: #180616;
        }

        :root[data-accent="amber"] {
            --accent-100: #fff9e6;
            --accent-200: #fff1cc;
            --accent-300: #ffe8a1;
            --accent-400: #ffd46a;
            --accent-500: #ffcc4d;
            --accent-600: #f2b83a;
            --accent-700: #d19a25;
            --accent-800: #a9791a;
            --accent-900: #7f5914;
            --accent-on: #0f0b02;
        }

        :root[data-accent="lime"] {
            --accent-100: #f3ffe3;
            --accent-200: #e7ffc8;
            --accent-300: #e0ffb8;
            --accent-400: #cdfb89;
            --accent-500: #b7ff64;
            --accent-600: #9deb49;
            --accent-700: #79c52e;
            --accent-800: #5a9a23;
            --accent-900: #3f6f19;
            --accent-on: #0b1304;
        }

        :root[data-accent="black"] {
            --accent-100: #f5f5f5;
            --accent-200: #e0e0e0;
            --accent-300: #c2c2c2;
            --accent-400: #9e9e9e;
            --accent-500: #757575;
            --accent-600: #555555;
            --accent-700: #333333;
            --accent-800: #1f1f1f;
            --accent-900: #000000;
            --accent-on: #ffffff;
        }

        :root[data-accent="white"] {
            --accent-100: #ffffff;
            --accent-200: #fafafa;
            --accent-300: #f5f5f5;
            --accent-400: #e0e0e0;
            --accent-500: #cccccc;
            --accent-600: #aaaaaa;
            --accent-700: #888888;
            --accent-800: #555555;
            --accent-900: #222222;
            --accent-on: #0b0f12;
        }

        /* 2) Theme surfaces/text/borders (maps to your role variables) */
        :root[data-theme="dark"] {
            /* Neutral surfaces with subtle accent tint */
            --surface-0: #0e1115;
            --surface-1: #0f141a;
            --surface-2: #141a22;

            --color-bg: color-mix(in oklab, var(--surface-0) 94%, var(--accent-900));
            --color-panel: color-mix(in oklab, var(--surface-1) 94%, var(--accent-900));
            --color-input: color-mix(in oklab, var(--surface-2) 96%, var(--accent-900));
            --color-control-bg: transparent;

            --color-text: color-mix(in oklab, var(--accent-600) 95%, transparent);
            --color-text-heading: var(--accent-300);

            --color-border: color-mix(in oklab, var(--accent-600) 18%, var(--color-panel));
            --color-primary: var(--accent-600);
            --color-primary-strong: var(--accent-700);
            --color-secondary: var(--accent-400);

            --ui-surface: var(--color-panel);
            --ui-surface-hover: color-mix(in oklab, var(--ui-surface), white 4%);
            --ui-surface-active: color-mix(in oklab, var(--color-primary), black 12%);
            --ui-border: var(--color-border);
            --ui-border-quiet: color-mix(in oklab, var(--color-border) 70%, transparent);
            --ui-border-strong: color-mix(in oklab, var(--color-primary) 55%, black 40%);
            --ui-glow: color-mix(in oklab, var(--color-primary), white 30%);

            --color-grid: color-mix(in oklab, var(--accent-600) 16%, transparent);
            --color-axis: color-mix(in oklab, var(--accent-400) 60%, transparent);

            --shadow-sm: 0 1px 1.5px rgba(0, 0, 0, .5);
            --shadow-md: 0 6px 18px rgba(0, 0, 0, .45);
        }

        :root[data-theme="light"] {
            --surface-0: #f6f8fb;
            --surface-1: #eef2f7;
            --surface-2: #e7edf5;

            --color-bg: color-mix(in oklab, var(--surface-0) 96%, var(--accent-200));
            --color-panel: color-mix(in oklab, var(--surface-1) 96%, var(--accent-200));
            --color-input: color-mix(in oklab, var(--surface-2) 96%, var(--accent-200));
            --color-control-bg: transparent;

            --color-text: color-mix(in oklab, var(--accent-900) 90%, transparent);
            --color-text-heading: var(--accent-800);

            --color-border: color-mix(in oklab, var(--accent-700) 20%, #b7c4d6);
            --color-primary: var(--accent-700);
            --color-primary-strong: var(--accent-800);
            --color-secondary: var(--accent-500);

            --ui-surface: var(--color-panel);
            --ui-surface-hover: color-mix(in oklab, var(--ui-surface), black 4%);
            --ui-surface-active: color-mix(in oklab, var(--color-primary), white 30%);
            --ui-border: var(--color-border);
            --ui-border-quiet: color-mix(in oklab, var(--color-border) 70%, transparent);
            --ui-border-strong: color-mix(in oklab, var(--color-primary) 55%, black 20%);
            --ui-glow: color-mix(in oklab, var(--color-primary), white 30%);

            --color-grid: color-mix(in oklab, var(--accent-700) 14%, transparent);
            --color-axis: color-mix(in oklab, var(--accent-700) 42%, transparent);

            --shadow-sm: 0 1px 1px rgba(0, 0, 0, .06);
            --shadow-md: 0 4px 14px rgba(0, 0, 0, .08);
        }

        /* B1) Accent fallback â€” if no [data-accent] is set, default to 'cyan' */
        :root:not([data-accent]) {
            --accent-100: #e4fff8;
            --accent-200: #cafff1;
            --accent-300: #a7ffe9;
            --accent-400: #5df0c9;
            --accent-500: #38ffd8;
            --accent-600: #1ce3bf;
            --accent-700: #12b69b;
            --accent-800: #0b8d78;
            --accent-900: #0a6d5d;
            --accent-on: #021a16;
        }

        /* B2) Theme fallback for â€œAutoâ€ on systems that prefer dark */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme]) {
                --surface-0: #0e1115;
                --surface-1: #0f141a;
                --surface-2: #141a22;

                --color-bg: color-mix(in oklab, var(--surface-0) 94%, var(--accent-900));
                --color-panel: color-mix(in oklab, var(--surface-1) 94%, var(--accent-900));
                --color-input: color-mix(in oklab, var(--surface-2) 96%, var(--accent-900));
                --color-control-bg: transparent;

                --color-text: color-mix(in oklab, var(--accent-100) 88%, transparent);
                --color-text-heading: var(--accent-300);

                --color-border: color-mix(in oklab, var(--accent-600) 18%, var(--color-panel));
                --color-primary: var(--accent-600);
                --color-primary-strong: var(--accent-700);
                --color-secondary: var(--accent-400);

                --ui-surface: var(--color-panel);
                --ui-surface-hover: color-mix(in oklab, var(--ui-surface), white 4%);
                --ui-surface-active: color-mix(in oklab, var(--color-primary), black 12%);
                --ui-border: var(--color-border);
                --ui-border-quiet: color-mix(in oklab, var(--color-border) 70%, transparent);
                --ui-border-strong: color-mix(in oklab, var(--color-primary) 55%, black 40%);
                --ui-glow: color-mix(in oklab, var(--color-primary), white 30%);

                --color-grid: color-mix(in oklab, var(--accent-600) 16%, transparent);
                --color-axis: color-mix(in oklab, var(--accent-400) 60%, transparent);

                --shadow-sm: 0 1px 1.5px rgba(0, 0, 0, .5);
                --shadow-md: 0 6px 18px rgba(0, 0, 0, .45);
            }
        }

        /* B3) Theme fallback for â€œAutoâ€ on systems that prefer light */
        @media (prefers-color-scheme: light) {
            :root:not([data-theme]) {
                --surface-0: #f6f8fb;
                --surface-1: #eef2f7;
                --surface-2: #e7edf5;

                --color-bg: color-mix(in oklab, var(--surface-0) 96%, var(--accent-200));
                --color-panel: color-mix(in oklab, var(--surface-1) 96%, var(--accent-200));
                --color-input: color-mix(in oklab, var(--surface-2) 96%, var(--accent-200));
                --color-control-bg: transparent;

                --color-text: color-mix(in oklab, var(--accent-900) 90%, transparent);
                --color-text-heading: var(--accent-800);

                --color-border: color-mix(in oklab, var(--accent-700) 20%, #b7c4d6);
                --color-primary: var(--accent-700);
                --color-primary-strong: var(--accent-800);
                --color-secondary: var(--accent-500);

                --ui-surface: var(--color-panel);
                --ui-surface-hover: color-mix(in oklab, var(--ui-surface), black 4%);
                --ui-surface-active: color-mix(in oklab, var(--color-primary), white 30%);
                --ui-border: var(--color-border);
                --ui-border-quiet: color-mix(in oklab, var(--color-border) 70%, transparent);
                --ui-border-strong: color-mix(in oklab, var(--color-primary) 55%, black 20%);
                --ui-glow: color-mix(in oklab, var(--color-primary), white 30%);

                --color-grid: color-mix(in oklab, var(--accent-700) 14%, transparent);
                --color-axis: color-mix(in oklab, var(--accent-700) 42%, transparent);

                --shadow-sm: 0 1px 1px rgba(0, 0, 0, .06);
                --shadow-md: 0 4px 14px rgba(0, 0, 0, .08);
            }
        }


        /* 3) Base */
        html,
        body {
            margin: 0;
            overflow: hidden;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-ui);
        }

        canvas {
            display: block;
        }

        /* 4) Panels */
        #settings,
        #hud,
        #pinListPanel {
            padding: var(--space-md);
            background: var(--color-panel);
            border-radius: var(--panel-radius);
            font-size: var(--font-md);
            box-shadow:
                0 0 0 1px color-mix(in oklab, var(--color-primary) var(--glow-border), transparent),
                0 0 18px color-mix(in oklab, var(--color-primary) var(--glow-panel), transparent),
                0 8px 24px rgba(0, 0, 0, .24);
            text-shadow: 0 0 6px color-mix(in oklab, var(--color-primary) var(--glow-text), transparent);
        }

        #settings {
            position: fixed;
            top: var(--space-md);
            right: var(--space-md);
            z-index: 100;
            max-width: 100%;
            min-width: 0;
            max-height: 95vh;
            overflow-y: auto;
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        #hud {
            position: fixed;
            top: var(--space-md);
            left: 50%;
            transform: translateX(-50%);
            color: var(--color-text);
            z-index: 200;
            display: flex;
            gap: var(--space-md);
            align-items: center;
        }

        #hud .hud-group {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        #pinListPanel {
            position: fixed;
            top: var(--space-md);
            left: var(--space-md);
            display: flex;
            flex-direction: column;
            height: 95vh;
            width: 300px;
            color: var(--color-text);
            z-index: 300;
            overflow: hidden;
            gap: var(--space-md);
        }

        .pin-panel-top {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .map-row {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .map-row .map-label {
            font-size: var(--font-sm);
            opacity: .78;
            white-space: nowrap;
        }

        #mapSelector {
            flex: 1 1 auto;
            min-width: 0;
        }

        .map-tools {
            display: flex;
            gap: var(--space-xs);
            flex: 0 0 auto;
        }

        /* 5) Menu */
        .menu-bar {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            border: 1px solid var(--border-color);
        }

        .menu {
            position: relative;
        }

        .menu-button {
            background: var(--color-control-bg);
            border: 1px solid var(--color-border);
            padding: 4px 8px;
            border-radius: var(--panel-radius);
            cursor: pointer;
            font-weight: 600;
        }

        .menu-button:hover {
            border-color: var(--color-primary);
        }

        .menu-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            min-width: 220px;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            box-shadow:
                0 0 0 1px color-mix(in oklab, var(--color-primary) var(--glow-border), transparent),
                0 0 14px color-mix(in oklab, var(--color-primary) var(--glow-panel), transparent),
                0 6px 16px rgba(0, 0, 0, 0.25);
            padding: 0;
            z-index: 10000;
            display: none;
        }

        .menu.open .menu-dropdown {
            display: block;
            background: var(--color-panel);
        }

        .menu-item {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            border: 1px solid transparent;
            padding: 6px 10px;
            cursor: pointer;
            font-size: var(--font-md);
        }

        .menu-item[disabled] {
            opacity: .5;
            cursor: default;
        }

        .menu-item:hover:not([disabled]) {
            background: var(--color-hover-highlight, var(--ui-surface-hover));
        }

        .menu-separator {
            background: var(--color-border);
            margin: 6px 0;
        }

        /* 6) Pin panel footer */
        .pin-panel-footer {
            padding: var(--space-sm);
            background: var(--bg-header);
            display: flex;
            align-items: center;
            gap: .5em;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .pin-list-footer {
            justify-content: right;
        }

        #hidePinListBtn {
            position: absolute;
            top: var(--space-md);
            right: calc(260px + var(--space-lg));
            z-index: 11;
        }

        .pin-footer-right {
            display: flex;
            align-items: right;
            gap: .3em;
        }

        .pin-filters {
            display: flex;
            gap: .3em;
        }

        /* 7) Pin list & cards */
        .scrollable-pin-list {
            overflow-y: auto;
            flex-grow: 1;
            padding: none;
            border: 1px solid var(--color-border);
            flex-direction: column;
        }

        .pin-card {
            position: relative;
            padding: var(--space-sm);
            background-color: var(--color-control-bg);
            border: 1px solid var(--color-border);
            font-size: var(--font-md);
        }

        .pin-card:hover,
        .pin-card.hovered {
            border: 1px solid var(--color-primary);
            background-color: var(--color-hover-highlight, var(--ui-surface-hover));
        }

        /* FIX: outline follows theme primary (replaces hardcoded orange) */
        .pin-card.selected {
            outline: 2px solid var(--color-primary);
            background-color: var(--bg-selected);
        }

        .pin-card-content {
            display: flex;
            flex-direction: column;
            align-items: left;
            gap: 8px;
        }

        .pin-card-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            font-size: var(--font-md);
            opacity: .75;
        }

        .pin-card-body {
            display: flex;
            flex-direction: row;
            gap: var(--space-sm);
            justify-content: left;
            line-height: 1.2;
        }

        .pin-card-row {
            display: flex;
            flex-direction: row;
        }

        .pin-icon {
            display: flex;
            font-size: 24px;
            align-self: stretch;
            line-height: 1;
        }

        .pin-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .pin-label {
            font-weight: bold;
        }

        .pin-tag {
            font-size: var(--font-sm);
            opacity: .8;
        }

        .pin-date-footer {
            position: absolute;
            right: var(--space-sm);
            bottom: var(--space-sm);
            font-size: var(--font-sm);
            opacity: .75;
        }

        /* Pin-card inline controls */
        .pin-controls {
            position: absolute;
            top: var(--space-xs);
            right: var(--space-xs);
            display: flex;
            gap: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 120ms ease;
            margin-top: 0;
            justify-content: flex-end;
        }

        .pin-card:hover .pin-controls,
        .pin-card:focus-within .pin-controls {
            opacity: 1;
            pointer-events: auto;
        }

        /* 8) Buttons (ghost baseline) */
        button,
        .menu-button,
        .menu-item {
            appearance: none;
            background: transparent;
            border: 1px solid var(--ui-border-quiet);
            color: var(--color-text);
            padding: 6px 10px;
            border-radius: var(--panel-radius);
            line-height: 1.1;
            cursor: pointer;
            transition: background .15s ease, border-color .15s ease, box-shadow .15s ease;
        }

        /* Hover = subtle surface + â€œglow-ishâ€ border (matches pin cards) */
        button:hover,
        .pin-controls button:hover,
        .menu-button:hover,
        .menu-item:hover:not([disabled]) {
            border-color: var(--color-primary);
            color: var(--color-primary);
            background: none;
        }

        /* Focus-visible = clear ring, subtle fill */
        button:focus-visible,
        .pin-controls button:focus-visible,
        .menu-button:focus-visible,
        .menu-item:focus-visible {
            outline: none;
            background: var(--ui-surface-hover);
            border-color: var(--ui-border-strong);
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--ui-glow), transparent 60%), 0 0 0 1px var(--ui-border-strong) inset;
        }

        /* Disabled */
        button[disabled],
        .menu-item[disabled] {
            opacity: .55;
            cursor: default;
        }

        /* Active/toggled */
        button[aria-pressed="true"],
        .btn--active {
            background: var(--ui-surface-active);
            border-color: var(--ui-border-strong);
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--ui-glow), transparent 30%), 0 0 0 1px var(--ui-border-strong) inset;
        }

        .io {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            line-height: 1;
            font-size: 1em;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .icon-only {
            inline-size: 38px;
            block-size: 38px;
            padding: 0;
        }

        .icon-only .io {
            font-size: 18px;
        }

        .btn-icon .io {
            font-size: 17px;
        }

        .icon-only[aria-pressed="false"] {
            opacity: .62;
            border-color: var(--ui-border-quiet);
        }

        #toggleCrosshair[aria-pressed="false"] {
            opacity: .72;
            border-color: var(--ui-border-quiet);
        }

        .icon-only[aria-pressed="true"],
        #toggleCrosshair[aria-pressed="true"] {
            opacity: 1;
        }

        .menu-item .io {
            margin-right: 8px;
            font-size: 15px;
        }

        /* Tiny icon buttons */
        .pin-controls button {
            background: none;
            border: 1px solid transparent;
            border-radius: var(--panel-radius);
            color: inherit;
            cursor: pointer;
            font-weight: bold;
            font-size: var(--font-sm);
            padding: var(--space-xs);
        }

        /* 9) Forms & inputs */
        .grid-form {
            display: grid;
            grid-template-columns: 50% 1fr;
            gap: var(--space-md) var(--space-sm);
            align-items: center;
            margin-bottom: var(--space-sm);
        }

        .grid-form label {
            margin: 0;
            font-size: var(--font-md);
        }

        .grid-form input,
        .grid-form select,
        .grid-form textarea {
            width: 100%;
            padding: var(--input-padding);
            border-radius: var(--input-radius);
            border: 1px solid var(--color-border);
            background-color: var(--color-input);
            color: var(--color-text);
            box-sizing: border-box;
            transition: border-color .15s ease, box-shadow .15s ease, background .15s ease, color .15s ease;
        }

        .grid-form input[type="range"] {
            background-color: var(--color-input);
        }

        #settings .grid-form input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            inline-size: 38px;
            block-size: 22px;
            border-radius: 999px;
            border: 1px solid var(--ui-border);
            background: var(--ui-surface);
            position: relative;
            cursor: pointer;
            transition: background .15s ease, border-color .15s ease;
            justify-self: start;
        }

        #settings .grid-form input[type="checkbox"]::before {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            inline-size: 16px;
            block-size: 16px;
            border-radius: 50%;
            background: var(--color-text);
            transition: transform .15s ease, background .15s ease;
        }

        #settings .grid-form input[type="checkbox"]:checked {
            background: color-mix(in oklab, var(--color-primary) 55%, var(--ui-surface));
            border-color: var(--ui-border-strong);
        }

        #settings .grid-form input[type="checkbox"]:checked::before {
            transform: translateX(16px);
            background: var(--accent-on);
        }

        .grid-form input[type="text"]:hover,
        .grid-form input[type="number"]:hover,
        .grid-form input[type="color"]:hover,
        .grid-form select:hover,
        .grid-form textarea:hover,
        .map-row select:hover {
            border-color: var(--ui-border-strong);
            box-shadow: 0 0 0 1px color-mix(in oklab, var(--ui-glow) 28%, transparent) inset;
            color: var(--color-primary);
        }

        .grid-form input[type="checkbox"]:hover {
            border-color: var(--ui-border-strong);
            box-shadow: 0 0 0 1px color-mix(in oklab, var(--ui-glow) 26%, transparent) inset;
        }

        .grid-form input[type="text"]:focus-visible,
        .grid-form input[type="number"]:focus-visible,
        .grid-form input[type="color"]:focus-visible,
        .grid-form select:focus-visible,
        .grid-form textarea:focus-visible,
        .map-row select:focus-visible {
            outline: none;
            border-color: var(--ui-border-strong);
            box-shadow: 0 0 0 2px color-mix(in oklab, var(--ui-glow) 40%, transparent);
        }

        .input-group {
            display: flex;
            gap: var(--space-sm);
            width: 100%;
            justify-content: right;
        }

        .input-group input {
            flex: 1;
        }

        .input-group input[type="checkbox"] {
            flex: 0 0 auto;
        }

        .input-group input[type="checkbox"] {
            flex: 0 0 auto;
        }

        .is-hidden {
            display: none !important;
        }

        select {
            background-color: var(--color-input);
            color: var(--color-text);
            border: 1px solid var(--color-border);
            border-radius: var(--input-radius);
            padding: var(--input-padding);
            width: 100%;
            height: 32px;
        }

        fieldset {
            border: 1px solid var(--color-border);
            padding: var(--space-md);
            gap: var(--space-sm);
            display: flex;
            flex-direction: column;
        }

        legend {
            font-weight: bold;
            color: var(--color-text-heading);
            font-size: var(--space-lg);
        }

        /* Color input */
        input[type="color"] {
            inline-size: 100%;
            block-size: 32px;
            padding: 0;
            background: transparent;
            border: 1px solid var(--ui-border-quiet);
            border-radius: var(--panel-radius);
            transition: background .15s, border-color .15s, box-shadow .15s;
        }

        input[type="color"]:hover {
            background: var(--ui-surface-hover);
            border-color: var(--ui-border);
        }

        input[type="color"]:focus-visible {
            outline: none;
            background: var(--ui-surface-hover);
            border-color: var(--ui-border-strong);
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--ui-glow), transparent 60%), 0 0 0 1px var(--ui-border-strong) inset;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: calc(var(--panel-radius) - 2px);
        }

        /* Range slider (WebKit) */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--ui-surface);
            border: 1px solid var(--ui-border-quiet);
            border-radius: 999px;
            transition: background .15s, border-color .15s, box-shadow .15s;
        }

        input[type="range"]:hover {
            background: var(--ui-surface-hover);
            border-color: var(--ui-border);
        }

        input[type="range"]:focus-visible {
            outline: none;
            border-color: var(--ui-border-strong);
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--ui-glow), transparent 60%), 0 0 0 1px var(--ui-border-strong) inset;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            inline-size: 14px;
            block-size: 14px;
            border-radius: 50%;
            background: var(--color-primary);
            border: 1px solid var(--color-text);
            cursor: pointer;
            transition: transform .1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.05);
        }

        /* Range slider (Firefox) */
        input[type="range"]::-moz-range-track,
        input[type="range"]::-moz-range-progress {
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent-700), var(--accent-500));
            border: 1px solid color-mix(in oklab, var(--accent-600) 40%, rgba(255, 255, 255, .12));
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-200);
            border: 2px solid var(--accent-600);
            box-shadow: 0 0 8px color-mix(in oklab, var(--accent-500) 50%, transparent);
        }

        /* Checkbox */
        input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            display: inline-block;
            vertical-align: middle;
            margin: 0;
            padding: 0;
            border: 1px solid var(--ui-border-quiet);
            border-radius: var(--panel-radius);
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: background .15s, border-color .15s, box-shadow .15s;
        }

        input[type="checkbox"]:hover {
            background: var(--ui-surface-hover);
            border-color: var(--ui-border);
        }

        input[type="checkbox"]:focus-visible {
            outline: none;
            background: var(--ui-surface-hover);
            border-color: var(--ui-border-strong);
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--ui-glow), transparent 60%), 0 0 0 1px var(--ui-border-strong) inset;
        }

        input[type="checkbox"]:checked {
            background: var(--ui-surface-active);
            border-color: var(--ui-border-strong);
        }

        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            inset: 0;
            display: none;
            place-items: center;
            font-size: 12px;
            line-height: 1;
            color: var(--color-primary);
            pointer-events: none;
        }

        /* 10) Minimap */
        .minimap-wrapper {
            position: relative;
            display: inline-block;
            margin: 20px;
        }

        #minimapContainer {
            position: fixed;
            bottom: var(--space-md);
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            border: 1px solid var(--color-border);
            background-color: var(--color-panel);
            box-shadow: var(--shadow-md);
            z-index: 100;
        }

        #minimapCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #minimapOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .minimap-label-group {
            position: absolute;
            display: flex;
            gap: 6px;
        }

        .minimap-label-group.top {
            top: -28px;
            left: 0;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            width: 100%;
        }

        .minimap-label-group.bottom {
            bottom: -28px;
            left: 0;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            width: 100%;
        }

        .minimap-label-group.left {
            left: -36px;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
        }

        .minimap-label-group.right {
            right: -34px;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
        }

        .label-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            text-align: center;
        }

        .label-header {
            font-weight: bold;
        }

        /* 11) Overlays & context menu */
        #noMapOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg-overlay, rgba(0, 0, 0, .85));
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            backdrop-filter: blur(3px);
        }

        #noMapOverlay .overlay-content {
            background: var(--card-bg, #222);
            padding: 2rem;
            border-radius: var(--panel-radius);
            box-shadow: 0 0 1rem rgba(0, 0, 0, .5);
        }

        .context-menu {
            position: fixed;
            display: none;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            padding: .25em 0;
            border-radius: var(--panel-radius);
            z-index: 1000;
            box-shadow:
                0 0 0 1px color-mix(in oklab, var(--color-primary) 20%, transparent),
                0 0 12px color-mix(in oklab, var(--color-primary) 16%, transparent),
                0 2px 6px rgba(0, 0, 0, .25);
            min-width: 160px;
        }

        .context-menu li {
            padding: .5em 1em;
            cursor: pointer;
            white-space: nowrap;
            color: var(--color-text);
        }

        .context-menu li:hover {
            background-color: var(--color-hover-highlight, var(--ui-surface-hover));
        }

        .context-menu button {
            display: block;
            width: 100%;
            padding: .25em .5em;
            text-align: left;
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
        }

        .context-menu button:hover {
            background: var(--color-hover-highlight, var(--ui-surface-hover));
        }

        /* 12) Cursor label */
        #cursorLabel {
            position: absolute;
            color: var(--color-primary);
            background: var(--color-panel);
            padding: 2px 6px;
            font-size: var(--font-md);
            border-radius: 4px;
            border: 1px solid var(--ui-border);
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        /* 13) Pin editor panel */
        #pinEditorPanel {
            position: absolute;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: var(--input-radius);
            padding: var(--space-md);
            display: none;
            z-index: 200;
            width: 240px;
            font-size: var(--font-base);
            box-shadow:
                0 0 0 1px color-mix(in oklab, var(--color-primary) var(--glow-border), transparent),
                0 0 16px color-mix(in oklab, var(--color-primary) var(--glow-panel), transparent),
                0 10px 26px rgba(0, 0, 0, .26);
        }

        body.is-map-dragging #settings,
        body.is-map-dragging #pinListPanel,
        body.is-map-dragging #minimapContainer,
        body.is-map-dragging #hud {
            pointer-events: none;
            opacity: .48;
            transition: opacity 80ms linear;
        }

        #pinEditorPanel .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
            align-items: center;
        }

        #pinEditorPanel input,
        #pinEditorPanel select,
        #pinEditorPanel textarea {
            width: 100%;
            margin-bottom: var(--space-sm);
            padding: var(--input-padding);
            background-color: var(--color-input);
            color: var(--color-text);
            border: 1px solid var(--color-border);
            border-radius: var(--input-radius);
            box-sizing: border-box;
        }

        /* 14) Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: transparent;
            border: 1px solid var(--color-text-heading);
            border-radius: var(--input-radius);
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--color-text-heading);
            cursor: grab;
        }

        /* 15) Stage (from Bonsai-inspired block you carried over) */
        #stageWrap {
            grid-area: stage;
            position: relative;
        }

        #bgOverlay {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        #stage {
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        /* keep z-index mapping clear for canvas/HUD */

        /* 16) Segmented control (Bonsai-style, tokenized) */
        .segmented {
            display: inline-grid;
            grid-auto-flow: column;
            gap: 6px;
            padding: 6px;
            border-radius: 10px;
            background: color-mix(in oklab, var(--surface-2) 85%, var(--accent-900));
            border: 1px solid color-mix(in oklab, var(--accent-600) 25%, var(--color-border));
        }

        .segmented .seg {
            padding: .35rem .6rem;
            border-radius: 8px;
            background: transparent;
            color: var(--color-text);
            border: 1px dashed color-mix(in oklab, var(--accent-600) 35%, var(--color-border));
            cursor: pointer;
            user-select: none;
            transition: background .22s cubic-bezier(.17, .67, .2, 1), border-color .22s cubic-bezier(.17, .67, .2, 1);
        }

        .segmented .seg[aria-pressed="true"],
        .segmented .seg.is-active {
            background: color-mix(in oklab, var(--accent-600) 40%, var(--surface-1) 60%);
            border: 1px solid color-mix(in oklab, var(--accent-600) 60%, var(--color-border));
            color: var(--accent-on);
        }

        .map-status {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 6px;
        }

        .map-row-loaded {
            justify-content: space-between;
        }

        .map-title-input {
            flex: 1 1 auto;
            min-width: 0;
            height: 30px;
            padding: 4px 8px;
            border-radius: var(--input-radius);
            border: 1px solid var(--color-border);
            background-color: var(--color-input);
            color: var(--color-text);
            font-weight: 600;
        }

        .panel-divider {
            border: 0;
            border-top: 1px solid var(--ui-border-quiet);
            margin: 0;
            width: 100%;
        }

        .pin-save-row {
            display: flex;
            justify-content: flex-end;
            padding-top: 0;
            width: auto;
        }

        .map-actions-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-sm);
            width: 100%;
            padding-top: var(--space-xs);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            border: 1px solid var(--ui-border);
            background: var(--ui-surface);
        }

        .badge--linked {
            border-color: color-mix(in oklab, var(--color-primary) 50%, var(--ui-border));
        }

        .badge .io {
            font-size: 13px;
        }
    </style>
</head>

<body>

    <!-- =================== ðŸŒ GLOBAL UI PANELS =================== -->
    <!-- UI: Settings Sidebar -->
    <div id="settings">
        <!-- Appearance ---------------------------------------------------------- -->
        <fieldset>
            <legend>INTERFACE</legend>

                    <option value="amber">Amber</option>
                    <option value="lime">Lime</option>
                    <option value="black">Black</option>
                    <option value="white">White</option>

                <div class="segmented" id="modeSegment">

                    <input type="number" id="minX" placeholder="Min">
                    <input type="number" id="maxX" placeholder="Max">

                <label for="minZ">Z Range</label>
                <div class="input-group">
                    <input type="number" id="minZ" placeholder="Min">

                <label for="showIcons">Icons</label>
                <input type="checkbox" id="showIcons" checked>

                <input type="checkbox" id="showText" checked>
                <label for="showCoords">Coordinates</label>
                <input type="checkbox" id="showCoords" checked>
                <label for="showDescription">Description</label>
                <input type="checkbox" id="showDescription" checked>
                <label for="showTags">Tags</label>
                <input type="checkbox" id="showTags" checked>

        <div id="pinListPanel">

    <script>

        // =================== ðŸŒ GLOBAL VARIABLES ===================
        // canvas, context, zoom, offset, pins, pinTypes, minimap settings...
        let currentFileHandle = null; // set when you use Open or Save As

        let __dirty = false;
        function markDirty() { __dirty = true; }
        function clearDirty() { __dirty = false; }


        const canvas = document.getElementById("mapCanvas");
        const ctx = canvas.getContext("2d");

        canvas.addEventListener("dblclick", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            pins.forEach((pin, i) => {
                const sx = offsetX + pin.x * zoom;
                const sy = offsetY + pin.z * zoom;
                const dx = mx - sx, dy = my - sy;
                if (Math.hypot(dx, dy) < 10) {
                    selectedPinIndex = i;
                    updatePinListHighlight();
                    editPin(i);
                }
            });
        });

        let textScale = 1;

        let width = 0;
        let height = 0;
        let offsetX = 0;
        let offsetY = 0;
        let zoom = 1;
        let initializedCamera = false;

        let contextWorldX = 0;
        let contextWorldZ = 0;

        let panStart = {}, isPanning = false;

        let pins = [
            { x: 0, z: 0, y: 64, id: "spawn", label: "Spawn Point", description: "Where you begin.", icon: "" },
        ];
        let currentEditIndex = null;
        let isPlacingPin = false;
        let tempPin = null;
        let tempPinScreenX = 0;
        let tempPinScreenY = 0;
        let hoveredPinIndex = null;
        let selectedPinIndex = null;
        let crosshairMode = false;

        let contextMenuPinIndex = null;
        let lastCursor = { x: 0, z: 0 };

        let crosshairX = 0;
        let crosshairY = 0;


        const minimapCanvas = document.getElementById("minimapCanvas");
        const minimapCtx = minimapCanvas.getContext("2d");
        const minimapSize = 200;

        const worldMinX = -30000;
        const worldMaxX = 30000;
        const worldMinZ = -30000;
        const worldMaxZ = 30000;

        const pinTypes = [
            { id: 'spawn', label: 'Spawn', icon: '\u2B50', uiIcon: 'iconoir-map-pin', category: 'Special' },
            { id: 'bed', label: 'Bed', icon: '\u{1F6CF}\uFE0F', uiIcon: 'iconoir-map-pin', category: 'Special' },
            { id: 'home', label: 'Home Base', icon: '\u{1F3E1}', uiIcon: 'iconoir-map-pin', category: 'Settlements' },
            { id: 'village', label: 'Village', icon: '\u{1F3D8}\uFE0F', uiIcon: 'iconoir-map-pin', category: 'Settlements' },
            { id: 'farm', label: 'Farm', icon: '\u{1F33E}', uiIcon: 'iconoir-map-pin', category: 'Settlements' },
            { id: 'mine', label: 'Mine Entrance', icon: '\u26CF\uFE0F', uiIcon: 'iconoir-map-pin', category: 'Structures' },
            { id: 'portal', label: 'Nether Portal', icon: '\u{1F300}', uiIcon: 'iconoir-map-pin', category: 'Structures' },
            { id: 'stronghold', label: 'Stronghold', icon: '\u{1F3F0}', uiIcon: 'iconoir-map-pin', category: 'Structures' },
            { id: 'ruins', label: 'Ruins', icon: '\u26B0\uFE0F', uiIcon: 'iconoir-map-pin', category: 'Structures' },
            { id: 'tower', label: 'Tower', icon: '\u{1F5FC}', uiIcon: 'iconoir-map-pin', category: 'Structures' },
            { id: 'beacon', label: 'Beacon', icon: '\u{1F48E}', uiIcon: 'iconoir-map-pin', category: 'Special' },
            { id: 'sign', label: 'Signpost', icon: '\u{1FAA7}', uiIcon: 'iconoir-map-pin', category: 'Special' },
            { id: 'danger', label: 'Danger', icon: '\u2620\uFE0F', uiIcon: 'iconoir-warning-triangle', category: 'Warnings' },
            { id: 'treasure', label: 'Treasure', icon: '\u{1FA99}', uiIcon: 'iconoir-map-pin', category: 'Warnings' }
        ];
        const quickPinContextItems = pinTypes.map(pt => ({
            label: `${pt.icon} ${pt.label}`,
            action: () => startPinPlacement(pt.id)
        }));

        let currentMapName = "default";
        const currentMapNameInput = document.getElementById("currentMapNameInput");

        function setCurrentMapNameUI(name) {
            const display = name || '';
            if (currentMapNameInput) {
                currentMapNameInput.value = display;
                currentMapNameInput.disabled = !display;
            }
        }

        function renameCurrentMap(newNameRaw) {
            if (!currentMapName) {
                alert("No map selected.");
                return false;
            }

            const trimmed = (newNameRaw || "").trim();
            if (!trimmed || trimmed === currentMapName) return false;
            if (currentMapName === "__new__") {
                alert("Please select a valid map to rename.");
                return false;
            }
            if (localStorage.getItem(`map:${trimmed}`)) {
                alert("A map with that name already exists.");
                return false;
            }

            const oldMap = currentMapName;
            const data = localStorage.getItem(`map:${oldMap}`);
            if (data === null) return false;

            localStorage.setItem(`map:${trimmed}`, data);
            localStorage.removeItem(`map:${oldMap}`);

            const oldMeta = localStorage.getItem(mapMetaKey(oldMap));
            if (oldMeta !== null) {
                localStorage.setItem(mapMetaKey(trimmed), oldMeta);
                localStorage.removeItem(mapMetaKey(oldMap));
            }

            currentMapName = trimmed;
            loadMapNames({ autoLoadFirst: false });
            loadMap(currentMapName);
            return true;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'p') {
                isPlacingPin = true;
                document.body.style.cursor = 'crosshair';
            }
        });

        if (currentMapNameInput) {
            currentMapNameInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    if (!renameCurrentMap(currentMapNameInput.value)) {
                        setCurrentMapNameUI(currentMapName);
                    }
                    currentMapNameInput.blur();
                } else if (e.key === "Escape") {
                    setCurrentMapNameUI(currentMapName);
                    currentMapNameInput.blur();
                }
            });
            currentMapNameInput.addEventListener("blur", () => {
                if (!renameCurrentMap(currentMapNameInput.value)) {
                    setCurrentMapNameUI(currentMapName);
                }
            });
        }

        document.getElementById("deleteMapBtn").addEventListener("click", () => {
            if (!currentMapName) return;

            const confirmDelete = confirm(`Delete "${currentMapName}"?`);
            if (!confirmDelete) return;

            localStorage.removeItem(`map:${currentMapName}`);

            const remaining = Object.keys(localStorage)
                .filter(k => k.startsWith("map:"))
                .map(k => k.slice(4));

            if (remaining.length > 0) {
                currentMapName = remaining[0];
                loadMapNames();
                loadMap(currentMapName);
            } else {
                currentMapName = null;
                setCurrentMapNameUI(null);
                pins = [];
                loadMapNames();
                updateOverlayVisibility();
            }
        });

        // =================== ðŸ” DOM INITIALIZATION ===================

        // ===== File menu wiring =====
        (function setupFileMenu() {
            const menu = document.getElementById('fileMenu');
            const btn = document.getElementById('fileMenuBtn');
            const dd = document.getElementById('fileMenuDropdown');
            const saveBtn = document.getElementById('menuSave');
            const saveAsBtn = document.getElementById('menuSaveAs');

            if (!menu || !btn || !dd) return;

            // Toggle dropdown
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('open');
            });

            // Close on outside click / Esc
            window.addEventListener('click', () => menu.classList.remove('open'));
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') menu.classList.remove('open');
            });

            // Command dispatch
            dd.addEventListener('click', (e) => {
                const item = e.target.closest('.menu-item');
                if (!item || item.disabled) return;

                const cmd = item.dataset.cmd;
                menu.classList.remove('open'); // close after click

                switch (cmd) {
                    case 'open':
                        openMapFromDisk();
                        break;
                    case 'save':
                        saveMapToDisk();
                        break;
                    case 'saveas':
                        saveAsMapToDisk();
                        break;
                    case 'import': {
                        const input = document.getElementById('importJsonInput');
                        if (input) input.click();
                        break;
                    }
                    case 'export':
                        exportCurrentMap();
                        break;
                }
            });

            // Keep Save/Save As enabled state in sync with file link
            function refreshSaveState() {
                const linked = (typeof currentFileHandle !== 'undefined') && !!currentFileHandle;
                saveBtn.disabled = !linked;
                saveAsBtn.disabled = !window.showSaveFilePicker;
                if (window.__reflectLinkUI) window.__reflectLinkUI();
            }

            // Expose a hook you can call elsewhere (after Open/Save As)
            window.__refreshSaveState = refreshSaveState;
            refreshSaveState();
        })();

        // ===== Linked/Unlinked status UI =====
        function reflectLinkUI() {
            const badge = document.getElementById('mapLinkBadge');
            const badgeIcon = document.getElementById('mapLinkBadgeIcon');
            const badgeText = document.getElementById('mapLinkBadgeText');
            const saveBtn = document.getElementById('menuSave');     // in File menu
            const saveAsBtn = document.getElementById('menuSaveAs'); // in File menu
            const linked = !!currentFileHandle;

            if (badge) {
                if (linked) {
                    if (badgeIcon) badgeIcon.className = 'io iconoir-check-circle';
                    if (badgeText) badgeText.textContent = `Linked: ${currentFileHandle.name || (currentMapName + '.json')}`;
                    badge.classList.add('badge--linked');
                } else {
                    if (badgeIcon) badgeIcon.className = 'io iconoir-warning-triangle';
                    if (badgeText) badgeText.textContent = 'Not Saved';
                    badge.classList.remove('badge--linked');
                }
            }

            // keep File menu buttons in sync too
            if (saveBtn) saveBtn.disabled = !linked;
            if (saveAsBtn) saveAsBtn.disabled = !window.showSaveFilePicker;
        }

        // Click â†’ Save Asâ€¦
        const linkBtn = document.getElementById('linkNowBtn');
        if (linkBtn) linkBtn.addEventListener('click', () => saveAsMapToDisk());

        // make this callable from elsewhere
        window.__reflectLinkUI = reflectLinkUI;

        // =================== ðŸ“¦ LOCAL STORAGE: MAP LOADING & SAVING ===================
        // saveCurrentMap, loadMap, loadMapNames, triggerNewMap
        let _diskSaveTimer = null;
        function queueDiskSave() {
            if (!currentFileHandle) return; // only if a file is open
            clearTimeout(_diskSaveTimer);
            _diskSaveTimer = setTimeout(() => { saveMapToDisk(); }, 800); // debounce ~0.8s
        }
        // Overlay button â†’ create new map (opens the same flow as the + button)
        function triggerNewMap() {
            createNewMapFlow();
        }

        // Overlay button â†’ import (clicks the hidden file input)
        function triggerImportMap() {
            const input = document.getElementById("importJsonInput");
            if (input) input.click();
        }

        function mapKey(name) {
            return `map:${name}`;
        }

        function mapExists(name) {
            return localStorage.getItem(mapKey(name)) !== null;
        }

        function dedupeMapName(baseName) {
            let name = baseName || "imported";
            if (!mapExists(name)) return name;
            let i = 2;
            while (mapExists(`${name}-${i}`)) i++;
            return `${name}-${i}`;
        }

        function saveMapAs(name, pinsArray) {
            const finalName = dedupeMapName(name);
            localStorage.setItem(mapKey(finalName), JSON.stringify(pinsArray || []));
            currentMapName = finalName;
            setCurrentMapNameUI(finalName);
            loadMapNames({ autoLoadFirst: false });
            loadMap(finalName);
            return finalName;
        }

        function mapMetaKey(name) { return `mapmeta:${name}`; }
        function getMapMeta(name) {
            try { return JSON.parse(localStorage.getItem(mapMetaKey(name)) || 'null'); }
            catch { return null; }
        }
        function setMapMeta(name, meta) {
            try { localStorage.setItem(mapMetaKey(name), JSON.stringify(meta || {})); }
            catch (e) { console.warn('Failed to set map meta', e); }
        }

        function saveCurrentMap() {
            if (!currentMapName) return; // skip saving if no valid name
            localStorage.setItem(`map:${currentMapName}`, JSON.stringify(pins));
            queueDiskSave();
        }

        function loadMap(name) {
            currentFileHandle = null;
            if (window.__refreshSaveState) window.__refreshSaveState();
            if (window.__reflectLinkUI) window.__reflectLinkUI();

            if (!name || !localStorage.getItem(`map:${name}`)) {
                currentMapName = null;
                setCurrentMapNameUI(null);
                pins = [];
                hoveredPinIndex = null;
                selectedPinIndex = null;
                renderPinList();
                updateOverlayVisibility();
                draw();
                return;
            }

            const data = localStorage.getItem(`map:${name}`);
            try {
                pins = JSON.parse(data);
            } catch {
                alert("Error loading map data.");
                pins = [];
            }

            currentMapName = name;
            setCurrentMapNameUI(name);
            renderPinList();
            updateOverlayVisibility();
            draw();
        }

        function loadMapNames({ autoLoadFirst = false } = {}) {
            const sel = document.getElementById('mapSelector');
            if (!sel) return;

            const names = Object.keys(localStorage)
                .filter(k => k.startsWith('map:'))
                .map(k => k.slice(4))
                .sort((a, b) => a.localeCompare(b));

            sel.innerHTML = '';

            // Optional placeholder if none
            if (names.length === 0) {
                currentMapName = null;
                setCurrentMapNameUI(null);
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = '(no maps)';
                sel.appendChild(opt);
            }

            names.forEach(name => {
                const meta = getMapMeta(name);
                const source = (meta && meta.source === 'disk') ? 'Disk' : 'Local';
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = `${source} | ${name}`;
                sel.appendChild(opt);
            });

            // Select current map if available
            if (currentMapName && names.includes(currentMapName)) {
                sel.value = currentMapName;
                setCurrentMapNameUI(currentMapName);
            } else if (autoLoadFirst && names[0]) {
                sel.value = names[0];
                loadMap(names[0]);
            }

            // Update overlay visibility
            updateOverlayVisibility?.();
        }


        // =================== ðŸ—ºï¸ DRAW FUNCTIONS ===================
        // draw(), drawMinimap()

        function draw() {
            const bgColor = document.getElementById("bgColor").value;
            const gridColor = document.getElementById("gridColor").value;
            const gridSpacing = parseInt(document.getElementById("gridSpacing").value);
            const showAxes = document.getElementById("showAxes").checked;
            const useTextScale = document.getElementById("useTextScale").checked;
            const showLabelBackground = document.getElementById("showLabelBackground").checked;
            const rootStyles = getComputedStyle(document.documentElement);
            const pinStrokePrimary = rootStyles.getPropertyValue('--color-primary');
            const pinStrokeSecondary = rootStyles.getPropertyValue('--color-secondary');
            const pinStrokeDefault = rootStyles.getPropertyValue('--color-text');
            const crosshairColor = rootStyles.getPropertyValue('--color-primary').trim() || '#ffffff';
            const axisColor = rootStyles.getPropertyValue('--color-axis').trim() || '#ffffff88';
            const pinIconColor = rootStyles.getPropertyValue('--color-text-heading').trim() || pinStrokeDefault.trim() || '#ffffff';
            const pinTextColor = rootStyles.getPropertyValue('--color-primary').trim() || '#86f7a2';
            const tempColor = rootStyles.getPropertyValue('--color-primary').trim() || '#86f7a2';
            const labelBgColor = rootStyles.getPropertyValue('--color-panel').trim() || '#000000';

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, width, height);

            const showGrid = document.getElementById("showGrid").checked;
            const showIcons = document.getElementById("showIcons").checked;
            const showText = document.getElementById("showText").checked;
            const showCoords = document.getElementById("showCoords").checked;
            const showDescription = document.getElementById("showDescription").checked;
            const showTags = document.getElementById("showTags").checked;
            const minX = parseInt(document.getElementById("minX").value);
            const maxX = parseInt(document.getElementById("maxX").value);
            const minZ = parseInt(document.getElementById("minZ").value);
            const maxZ = parseInt(document.getElementById("maxZ").value);
            const visibleMinX = Math.floor(-offsetX / zoom);
            const visibleMaxX = Math.ceil((width - offsetX) / zoom);
            const visibleMinZ = Math.floor(-offsetY / zoom);
            const visibleMaxZ = Math.ceil((height - offsetY) / zoom);
            const startX = Math.floor(visibleMinX / gridSpacing) * gridSpacing;
            const endX = Math.ceil(visibleMaxX / gridSpacing) * gridSpacing;
            const startZ = Math.floor(visibleMinZ / gridSpacing) * gridSpacing;
            const endZ = Math.ceil(visibleMaxZ / gridSpacing) * gridSpacing;

            const maxLines = 1000;

            if ((endX - startX) / gridSpacing > maxLines) return; // skip draw
            if (zoom < 0.1) return; // skip grid when zoomed out too far

            if (showGrid && gridSpacing > 0) {
                ctx.save();
                ctx.strokeStyle = gridColor;
                ctx.lineWidth = 1;

                for (let x = startX; x <= endX; x += gridSpacing) {
                    const sx = offsetX + x * zoom;
                    ctx.beginPath();
                    ctx.moveTo(sx, 0);
                    ctx.lineTo(sx, height);
                    ctx.stroke();
                }

                for (let z = startZ; z <= endZ; z += gridSpacing) {
                    const sz = offsetY + z * zoom;
                    ctx.beginPath();
                    ctx.moveTo(0, sz);
                    ctx.lineTo(width, sz);
                    ctx.stroke();
                }
                ctx.restore();
            }

            if (showAxes) {
                ctx.strokeStyle = axisColor;
                ctx.beginPath();
                ctx.moveTo(offsetX + 0 * zoom, 0);
                ctx.lineTo(offsetX + 0 * zoom, height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, offsetY + 0 * zoom);
                ctx.lineTo(width, offsetY + 0 * zoom);
                ctx.stroke();
            }

            for (let i = 0; i < pins.length; i++) {
                if (i !== hoveredPinIndex) drawPin(ctx, pins[i], i, pinStrokePrimary, pinStrokeSecondary, pinStrokeDefault);
            }
            if (hoveredPinIndex !== null && pins[hoveredPinIndex]) {
                drawPin(ctx, pins[hoveredPinIndex], hoveredPinIndex, pinStrokePrimary, pinStrokeSecondary, pinStrokeDefault);
            }

            for (const p of pins) {
                if (p.x < minX || p.x > maxX || p.z < minZ || p.z > maxZ) continue;
                const sx = offsetX + p.x * zoom;
                const sy = offsetY + p.z * zoom;

                const fontSize = useTextScale ? (12 * textScale) : Math.max(10, 12 * zoom);
                const labelOffsetX = 8 * zoom;
                const labelOffsetY = 0;

                if (showIcons && p.icon) {
                    const iconSize = Math.max(10, 12 * zoom); // match your scaling
                    ctx.font = `${iconSize}px monospace`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "bottom";
                    ctx.fillStyle = pinIconColor;

                    ctx.fillText(p.icon, sx, sy - 8); // just above the pin
                }

                ctx.font = `${fontSize}px monospace`;
                ctx.textAlign = "left";
                ctx.textBaseline = "bottom";

                // ðŸŸ¨ Background box (must come before text)
                if (showLabelBackground) {
                    const text = p.label;
                    const metrics = ctx.measureText(text);
                    const padding = 4;
                    const bgWidth = metrics.width + padding * 2;
                    const bgHeight = fontSize + padding * 2;
                    const bgX = sx + labelOffsetX - padding;
                    const bgY = sy - bgHeight / 2;

                    ctx.fillStyle = labelBgColor;
                    ctx.globalAlpha = 0.82;
                    ctx.fillRect(bgX, bgY, bgWidth, bgHeight);
                    ctx.globalAlpha = 1;
                }

                if (showText) {
                    const yText = (p.y === undefined || p.y === null || p.y === '' || Number.isNaN(p.y)) ? '-' : p.y;
                    ctx.fillStyle = pinTextColor;
                    if (showTags && p.id) ctx.fillText(`[${p.id}]`, sx + labelOffsetX, sy);
                    if (showCoords) ctx.fillText(`(${p.x}, ${yText}, ${p.z})`, sx + labelOffsetX, sy + fontSize * 1.2);
                    ctx.fillText(p.label, sx + labelOffsetX, sy + fontSize * 2.4);
                    if (showDescription && p.description) ctx.fillText(p.description, sx + labelOffsetX, sy + fontSize * 3.6);
                }

            }
            if (tempPin) {
                const px = tempPin.x * zoom + offsetX;
                const pz = tempPin.z * zoom + offsetY;

                // Draw placeholder pin
                ctx.beginPath();
                ctx.arc(px, pz, 6, 0, Math.PI * 2);
                ctx.fillStyle = tempColor;
                ctx.fill();

                // Draw line from panel to placeholder
                ctx.beginPath();
                ctx.moveTo(tempPinScreenX, tempPinScreenY);
                ctx.lineTo(px, pz);
                ctx.strokeStyle = tempColor;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            if (crosshairMode) {
                ctx.strokeStyle = crosshairColor;
                ctx.lineWidth = 1.25;
                ctx.setLineDash([4, 4]);

                ctx.beginPath();
                ctx.moveTo(crosshairX, 0);
                ctx.lineTo(crosshairX, height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, crosshairY);
                ctx.lineTo(width, crosshairY);
                ctx.stroke();

                ctx.setLineDash([]);
            }
            drawScaleRuler();
            drawMinimap();
        }

        function drawPin(ctx, pin, i, pinStrokePrimary, pinStrokeSecondary, pinStrokeDefault) {
            const screenX = offsetX + pin.x * zoom;
            const screenY = offsetY + pin.z * zoom;

            ctx.beginPath();
            ctx.arc(screenX, screenY, 6, 0, Math.PI * 2);
            ctx.fillStyle = pin.color || "#ffcc00";
            ctx.fill();

            if (i === hoveredPinIndex) {
                ctx.strokeStyle = pinStrokePrimary;
                ctx.lineWidth = 2.5;
            } else if (i === selectedPinIndex) {
                ctx.strokeStyle = pinStrokeSecondary;
                ctx.lineWidth = 2.5;
            } else {
                ctx.strokeStyle = pinStrokeDefault;
                ctx.lineWidth = 1;
            }

            ctx.stroke();

        }

        function drawScaleRuler() {
            const showGridEl = document.getElementById("showGrid");
            const gridSpacingEl = document.getElementById("gridSpacing");
            if (!showGridEl || !gridSpacingEl) return;
            if (!showGridEl.checked) return;
            const rootStyles = getComputedStyle(document.documentElement);
            const rulerColor = rootStyles.getPropertyValue('--color-primary').trim() || '#86f7a2';

            const spacing = parseInt(gridSpacingEl.value || "16", 10);
            if (!Number.isFinite(spacing) || spacing <= 0) return;

            const px = spacing * zoom;                 // screen length of one grid cell
            const label = `${spacing} blocks`;

            const pad = 10;
            const y = canvas.height - pad - 18;        // baseline y
            const minLen = 24, maxLen = 180;           // keep it readable
            const len = Math.max(minLen, Math.min(px, maxLen));
            const x0 = pad;
            const x1 = x0 + len;

            ctx.save();
            ctx.strokeStyle = rulerColor;
            ctx.fillStyle = rulerColor;
            ctx.lineWidth = 2;

            // baseline
            ctx.beginPath();
            ctx.moveTo(x0, y);
            ctx.lineTo(x1, y);
            ctx.stroke();

            // end ticks
            ctx.beginPath();
            ctx.moveTo(x0, y - 4); ctx.lineTo(x0, y + 4);
            ctx.moveTo(x1, y - 4); ctx.lineTo(x1, y + 4);
            ctx.stroke();

            // label
            ctx.font = "12px monospace";
            ctx.textBaseline = "top";
            ctx.fillText(label, x0, y + 6);

            ctx.restore();
        }

        function drawMiniGrid() {
            const spacing = Math.max(1000, Math.floor((worldMaxX - worldMinX) / 20));
            const rootStyles = getComputedStyle(document.documentElement);
            const miniGridColor = rootStyles.getPropertyValue('--color-grid').trim() || "rgba(255, 255, 255, 0.1)";
            minimapCtx.strokeStyle = miniGridColor;
            minimapCtx.lineWidth = 1;

            const worldWidth = worldMaxX - worldMinX;
            const worldHeight = worldMaxZ - worldMinZ;
            const scale = Math.min(minimapSize / worldWidth, minimapSize / worldHeight);

            const offsetX = -worldMinX * scale;
            const offsetZ = -worldMinZ * scale;

            for (let x = worldMinX; x <= worldMaxX; x += spacing) {
                const sx = offsetX + x * scale;
                minimapCtx.beginPath();
                minimapCtx.moveTo(sx, 0);
                minimapCtx.lineTo(sx, minimapSize);
                minimapCtx.stroke();
            }

            for (let z = worldMinZ; z <= worldMaxZ; z += spacing) {
                const sz = offsetZ + z * scale;
                minimapCtx.beginPath();
                minimapCtx.moveTo(0, sz);
                minimapCtx.lineTo(minimapSize, sz);
                minimapCtx.stroke();
            }
        }

        function drawMinimap() {
            minimapCtx.clearRect(0, 0, minimapSize, minimapSize);
            const rootStyles = getComputedStyle(document.documentElement);
            const miniText = rootStyles.getPropertyValue('--color-text').trim() || '#ffffff';
            const miniCrop = rootStyles.getPropertyValue('--color-secondary').trim() || '#ffa500';
            const miniView = rootStyles.getPropertyValue('--color-primary').trim() || '#00ff99';
            const miniHover = rootStyles.getPropertyValue('--color-primary').trim() || '#00ff99';
            const miniStroke = rootStyles.getPropertyValue('--color-panel').trim() || '#000000';
            const miniSelected = rootStyles.getPropertyValue('--color-secondary').trim() || '#ffa500';

            // 1. Compute total world range
            const worldWidth = worldMaxX - worldMinX;
            const worldHeight = worldMaxZ - worldMinZ;

            // 2. Compute scale factor to fit world into minimap canvas
            const scale = Math.min(minimapSize / worldWidth, minimapSize / worldHeight);

            // Read crop bounds
            let minX = parseInt(document.getElementById("minX").value);
            let maxX = parseInt(document.getElementById("maxX").value);
            let minZ = parseInt(document.getElementById("minZ").value);
            let maxZ = parseInt(document.getElementById("maxZ").value);

            if (isNaN(minX)) minX = -1000;
            if (isNaN(maxX)) maxX = 1000;
            if (isNaN(minZ)) minZ = -1000;
            if (isNaN(maxZ)) maxZ = 1000;

            const cropWidth = maxX - minX;
            const cropHeight = maxZ - minZ;

            // 3. Offset = world origin â†’ canvas origin
            const worldOffsetX = -worldMinX * scale;
            const worldOffsetZ = -worldMinZ * scale;

            const showMiniGrid = document.getElementById('showMiniGrid')?.checked;
            if (showMiniGrid) drawMiniGrid();

            // ðŸ“¦ Draw crop bounds
            minimapCtx.strokeStyle = miniCrop;
            minimapCtx.lineWidth = 1;
            minimapCtx.strokeRect(
                worldOffsetX + minX * scale,
                worldOffsetZ + minZ * scale,
                (maxX - minX) * scale,
                (maxZ - minZ) * scale
            );

            // ðŸŽ¥ Draw current camera viewport
            // ðŸŽ¥ Correctly calculate the visible viewport
            const topLeftWorldX = (-offsetX) / zoom;
            const topLeftWorldZ = (-offsetY) / zoom;
            const bottomRightWorldX = (width - offsetX) / zoom;
            const bottomRightWorldZ = (height - offsetY) / zoom;

            const viewX = topLeftWorldX * scale + worldOffsetX;
            const viewZ = topLeftWorldZ * scale + worldOffsetZ;
            const viewWidth = (bottomRightWorldX - topLeftWorldX) * scale;
            const viewHeight = (bottomRightWorldZ - topLeftWorldZ) * scale;

            // ðŸ“ Draw all pins except hovered one
            for (let i = 0; i < pins.length; i++) {
                if (i === hoveredPinIndex) continue;

                const p = pins[i];
                const px = worldOffsetX + p.x * scale;
                const pz = worldOffsetZ + p.z * scale;

                if (!isFinite(px) || !isFinite(pz)) continue;

                minimapCtx.beginPath();
                minimapCtx.arc(px, pz, 2, 0, Math.PI * 2);

                if (i === selectedPinIndex) {
                    minimapCtx.fillStyle = miniSelected;
                } else {
                    minimapCtx.fillStyle = p.color || "yellow";
                }

                minimapCtx.fill();
            }

            // âœ… Draw hovered pin on top
            if (hoveredPinIndex !== null && pins[hoveredPinIndex]) {
                const p = pins[hoveredPinIndex];
                const px = worldOffsetX + p.x * scale;
                const pz = worldOffsetZ + p.z * scale;

                if (isFinite(px) && isFinite(pz)) {
                    minimapCtx.beginPath();
                    minimapCtx.arc(px, pz, 2, 0, Math.PI * 2);
                    minimapCtx.fillStyle = miniHover;
                    minimapCtx.strokeStyle = miniStroke;
                    minimapCtx.lineWidth = 1;
                    minimapCtx.stroke();
                    minimapCtx.fill();
                }
            }

            // âœ… Draw current view window (draw once, not per pin)
            minimapCtx.strokeStyle = miniView;
            minimapCtx.lineWidth = 1;
            minimapCtx.strokeRect(viewX, viewZ, viewWidth, viewHeight);

            drawMinimapLabels(minimapCtx, minimapCanvas.width, minimapCanvas.height, miniText);

            // World limits
            document.getElementById("worldMinX").textContent = worldMinX;
            document.getElementById("worldMaxX").textContent = worldMaxX;
            document.getElementById("worldMinZ").textContent = worldMinZ;
            document.getElementById("worldMaxZ").textContent = worldMaxZ;

            // Crop limits
            document.getElementById("cropMinX").textContent = minX;
            document.getElementById("cropMaxX").textContent = maxX;
            document.getElementById("cropMinZ").textContent = minZ;
            document.getElementById("cropMaxZ").textContent = maxZ;

            // Viewport (based on offset)
            const viewMinX = Math.round(-offsetX / zoom);
            const viewMaxX = Math.round((width - offsetX) / zoom);
            const viewMinZ = Math.round(-offsetY / zoom);
            const viewMaxZ = Math.round((height - offsetY) / zoom);

            document.getElementById("viewMinX").textContent = viewMinX;
            document.getElementById("viewMaxX").textContent = viewMaxX;
            document.getElementById("viewMinZ").textContent = viewMinZ;
            document.getElementById("viewMaxZ").textContent = viewMaxZ;
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            if (!initializedCamera) {
                offsetX = -width / 2;
                offsetY = -height / 2;
                initializedCamera = true;
            }

            draw();
        }
        function drawMinimapLabels(ctxMini, canvasWidth, canvasHeight, textColor) {
            const padding = 8;
            ctxMini.fillStyle = textColor || "#fff";
            ctxMini.font = "12px sans-serif";
            ctxMini.textAlign = "center";
            ctxMini.textBaseline = "middle";

            // Top
            ctxMini.fillText("North", canvasWidth / 2, padding);

            // Bottom
            ctxMini.fillText("South", canvasWidth / 2, canvasHeight - padding);

            // Left (rotated)
            ctxMini.save();
            ctxMini.translate(padding, canvasHeight / 2);
            ctxMini.rotate(-Math.PI / 2);
            ctxMini.fillText("West", 0, 0);
            ctxMini.restore();

            // Right (rotated)
            ctxMini.save();
            ctxMini.translate(canvasWidth - padding, canvasHeight / 2);
            ctxMini.rotate(Math.PI / 2);
            ctxMini.fillText("East", 0, 0);
            ctxMini.restore();
        }

        function initApp() {
            // 1. Zoom level
