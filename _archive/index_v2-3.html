            draw();

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll("\"", "&quot;")
                .replaceAll("'", "&#39;");
        }

        function renderPinIconMarkup(rawIcon) {
            const icon = String(rawIcon ?? "").trim();
            if (!icon) return '<span class="io iconoir-map-pin" aria-hidden="true"></span>';
            return escapeHtml(icon);
        }

        function renderPinList() {
            const container = document.getElementById('pinList');
            container.innerHTML = '';

            // âœ… Always update pin count even if 0
            const pinCountEl = document.getElementById("pinCount");
            if (pinCountEl) pinCountEl.textContent = `(${pins.length})`;

            if (!Array.isArray(pins) || pins.length === 0) {
                container.innerHTML = '<p>No pins yet.</p>';
                return;
            }

            pins.forEach((pin, index) => {
                const item = document.createElement('div');
                item.className = 'pin-card';
                item.dataset.index = index;  // ðŸ“Œ for matching
                item.tabIndex = 0;           // enables :focus-within to show controls

                const yStr = (pin.y === undefined || pin.y === null || pin.y === '' || Number.isNaN(pin.y)) ? '-' : pin.y;
                const time = pin.timestamp
                    ? new Date(pin.timestamp).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
                    : '';
                const safeLabel = escapeHtml(pin.label || "(no label)");
                const safeTag = pin.id ? `[${escapeHtml(pin.id)}]` : "";
                const safeIcon = renderPinIconMarkup(pin.icon);

                // Card markup (coords header; icon+text stack; footer date)
                item.innerHTML = `
                    <div class="pin-card-content">
                        <div class="pin-card-header">
                        <medium>x:${pin.x} y:${yStr} z:${pin.z}</medium>
                        </div>

                        <div class="pin-card-body">
                        <span class="pin-icon">${safeIcon}</span>
                        <div class="pin-text">
                            <div class="pin-label">${safeLabel}</div>
                            <div class="pin-tag">${safeTag}</div>
                        </div>
                        </div>

                        <div class="pin-date-footer">${time}</div>
                    </div>
                `;

                // Whole row centers on pin
                item.onclick = () => centerOnPin(pin);

                // ðŸ”„ Hover effect (list â†’ canvas)
                item.addEventListener("mouseenter", () => { hoveredPinIndex = index; draw(); });
                item.addEventListener("mouseleave", () => { hoveredPinIndex = null; draw(); });

                // === TOP-RIGHT CONTROLS (hidden until hover/focus) ===
                const controls = document.createElement('div');
                controls.className = 'pin-controls'; // CSS positions this at top-right and hides by default

                // Buttons (NO listeners here â€” we delegate later)
                const btnCopy = document.createElement('button');

                btnCopy.title = 'Copy coordinates';
                btnCopy.innerHTML = '<span class="io iconoir-copy" aria-hidden="true"></span>';

                const btnCenter = document.createElement('button');

                const btnEdit = document.createElement('button');

                controls.appendChild(btnCopy);

                controls.appendChild(btnEdit);
                controls.appendChild(btnDelete);

                container.appendChild(item);
            });

            // âœ… re-sync count at end (kept from your version)

        }


        function centerOnPin(pin) {
            if (!pin) return;

        // =================== ðŸ“Œ PIN MANAGEMENT ===================
        // openPinEditor(), submitPinEditor(), closePinEditor(), editPin(), addPin()
        function openPinEditor(_, __, worldX, worldZ, typeID = "", icon = "", label = "") {
            const panel = document.getElementById('pinEditorPanel');

            // Convert world â†’ canvas â†’ screen position
            const px = offsetX + worldX * zoom;
            const pz = offsetY + worldZ * zoom;
            const rect = canvas.getBoundingClientRect();
            let screenX = rect.left + px;
            let screenY = rect.top + pz;

            // Prevent panel from overflowing the viewport
            const panelWidth = 240;
            const panelHeight = 200;
            const padding = 10;

            const vw = window.innerWidth;
            const vh = window.innerHeight;

            if (screenX + panelWidth + padding > vw) {
                screenX = vw - panelWidth - padding;
            }
            if (screenY + panelHeight + padding > vh) {
                screenY = vh - panelHeight - padding;
            }

            panel.style.left = `${screenX}px`;
            panel.style.top = `${screenY}px`;
            panel.style.display = 'block';

            // Save for drawing line
            tempPin = { x: worldX, z: worldZ };
            tempPinScreenX = px;
            tempPinScreenY = pz;

            // Clear or prepare inputs
            document.getElementById('pinEditorX').value = worldX;
            document.getElementById('pinEditorY').value = '';
            document.getElementById('pinEditorZ').value = worldZ;
            document.getElementById('pinEditorID').value = typeID;
            document.getElementById('pinEditorLabel').value = label || typeID;
            document.getElementById('pinEditorDescription').value = '';
            document.getElementById('pinEditorIcon').value = icon;

            const fields = document.querySelectorAll('#pinEditorPanel input, #pinEditorPanel textarea');
            fields.forEach(field => {
                field.onkeydown = (e) => {
                    if (e.key === 'Enter') {
                        if (e.ctrlKey || e.metaKey) {
                            e.preventDefault();
                            submitPinEditor();
                        } else {
                            e.preventDefault();
                            focusNextInput(e.target);
                        }
                    }
                };
            });

            setTimeout(() => {
                document.getElementById('pinEditorLabel').focus();
            }, 0);

            draw();
        }

        function startPinPlacement(typeID) {

        function addPin() {

            const description = document.getElementById("pinDescription").value;
            const icon = document.getElementById("pinIcon").value;
            if (isNaN(x) || isNaN(z)) return alert("X and Z are required.");
            pins.push({ x, y, z, id, label, description: description, icon });

        function submitPinEditor() {
            const x = parseInt(document.getElementById('pinEditorX').value);
            const y = parseInt(document.getElementById('pinEditorY').value);
            const z = parseInt(document.getElementById('pinEditorZ').value);
            const id = document.getElementById('pinEditorID').value;
            const label = document.getElementById('pinEditorLabel').value;
            const description = document.getElementById('pinEditorDescription').value;
            const icon = document.getElementById('pinEditorIcon').value;
            const color = document.getElementById('pinEditorColor').value;
            const pinData = {
                x, y, z, id, label, description, icon, color,
            };

            if (currentEditIndex !== null) {
                pinData.createdAt = pins[currentEditIndex].createdAt ?? pinData.createdAt;
                pins[currentEditIndex] = pinData;
            } else {
                if (!pinData.timestamp) {
                    pinData.timestamp = new Date().toISOString();
                }
                pins.push(pinData);
            }
            renderPinList();
            closePinEditor();
            currentEditIndex = null;
            tempPin = null;
            markDirty()
            saveCurrentMap();
            draw();
        }

        // Optional: apply settings if present in imported file
        function applySettingsSnapshot(s) {
            if (!s) return;
            const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
            const check = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };

            if (s.bgColor) set("bgColor", s.bgColor);
            if (s.gridColor) set("gridColor", s.gridColor);
            if (Number.isFinite(s.gridSpacing)) set("gridSpacing", s.gridSpacing);
            if ("showGrid" in s) check("showGrid", s.showGrid);

            };

        // Import map JSON (supports array-of-pins or object-with-pins)
        async function importMapFromFile(file) {
            const text = await file.text();
            let data;
            try {
                data = JSON.parse(text);
            } catch {
                alert("Invalid JSON file.");
                return;
            }

            // Accept either: [pins]  OR  { pins, name, settings }
            let importedPins = [];
            let importedName = file.name.replace(/\.json$/i, "");
            let importedSettings = null;

            if (Array.isArray(data)) {
                importedPins = data;
            } else if (data && typeof data === "object") {
                if (Array.isArray(data.pins)) importedPins = data.pins;
                if (data.name) importedName = String(data.name);
                if (data.settings) importedSettings = data.settings;
            } else {
                alert("Unsupported JSON format.");
                return;
            }

            // Normalize pins a bit
            importedPins = importedPins.map(p => ({
                x: Number(p.x) || 0,
                z: Number(p.z) || 0,
                y: Number.isFinite(p.y) ? Number(p.y) : undefined,
                id: (p.id ?? "").toString(),
                label: (p.label ?? "").toString(),
                description: (p.description ?? "").toString(),
                icon: (p.icon ?? "").toString(),
                color: (p.color ?? "").toString(),
                tags: Array.isArray(p.tags) ? p.tags.map(String) : undefined,
                timestamp: p.timestamp || new Date().toISOString()
            }));

            // âœ… IMPORT semantics: create a new saved map (unlinked copy)
            const finalName = saveMapAs(importedName, importedPins);

            // Apply settings if provided (optional)
            if (importedSettings) {
                applySettingsSnapshot(importedSettings);
            }

            setMapMeta(finalName, { source: 'local' });
            loadMapNames({ autoLoadFirst: false });

            // Refresh UI
            renderPinList();
            draw();

            alert(`Imported as new map: "${finalName}"`);
        }

                // Accept either [pins] or {pins, settings, name}
                let importedPins = [];
                let importedSettings = null;

                if (Array.isArray(data)) {

                } else {

        async function saveMapToDisk() {

        /* =================== âš™ï¸ CONTEXT MENU SYSTEM =================== */

        function showContextMenu(items, x, y) {
            const menu = document.getElementById("contextMenu");
            const list = document.getElementById("contextMenuItems"); // <ul> inside the menu
            if (!menu || !list) return;

            // Build items
            list.innerHTML = "";
            items.forEach(({ label, action, iconClass }) => {
                const li = document.createElement("li");
                if (iconClass) {
                    const icon = document.createElement("span");
                    icon.className = `io ${iconClass}`;
                    icon.setAttribute("aria-hidden", "true");
                    icon.style.marginRight = "8px";
                    li.appendChild(icon);
                }
                li.appendChild(document.createTextNode(label));
                li.onclick = (ev) => {
                    ev.stopPropagation();
                    try { action && action(); } finally {
                        hideContextMenu();
                    }
                };
                list.appendChild(li);
            });

            // Position near cursor, then clamp to viewport
            menu.style.left = `${x}px`;
            menu.style.top = `${y}px`;
            menu.style.display = "block";

            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const r = menu.getBoundingClientRect();

            const left = (x + r.width > vw) ? (x - r.width) : x;
            const top = (y + r.height > vh) ? (y - r.height) : y;

            menu.style.left = `${Math.max(0, left)}px`;
            menu.style.top = `${Math.max(0, top)}px`;
        }

            // Use the API if available (it is), otherwise write attributes directly.
            const setMode = (m) => (window.MapItTheme ? window.MapItTheme.setMode(m) : html.setAttribute('data-theme', m === 'auto' ? '' : m));
            const setAccent = (a) => (window.MapItTheme ? window.MapItTheme.setAccent(a) : html.setAttribute('data-accent', a));
            const getMode = () => (window.MapItTheme ? window.MapItTheme.getMode() : (html.getAttribute('data-theme') || 'auto'));
            const getAccent = () => (window.MapItTheme ? window.MapItTheme.getAccent() : (html.getAttribute('data-accent') || 'cyan'));
            const getEffectiveMode = () => {
                const mode = getMode();
                if (mode === 'light' || mode === 'dark') return mode;
                return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            };

            const accentSelect = document.getElementById('accentSelect');
            const modeLightBtn = document.getElementById('modeLightBtn');
            const modeDarkBtn = document.getElementById('modeDarkBtn');
            const glowSelect = document.getElementById('glowIntensitySelect');

            function applyGlowPreset(name) {
                const preset = GLOW_PRESETS[name] || GLOW_PRESETS.standard;
                html.style.setProperty('--glow-panel', preset.panel);
                html.style.setProperty('--glow-text', preset.text);
                html.style.setProperty('--glow-border', preset.border);
                localStorage.setItem(STORAGE_KEY_GLOW, (GLOW_PRESETS[name] ? name : 'standard'));
            }

            function reflectUI() {
                const mode = getEffectiveMode();
                if (modeLightBtn) modeLightBtn.setAttribute('aria-pressed', String(mode === 'light'));
                if (modeDarkBtn) modeDarkBtn.setAttribute('aria-pressed', String(mode === 'dark'));
                if (accentSelect) accentSelect.value = getAccent();
                if (glowSelect) {
                    const savedGlow = localStorage.getItem(STORAGE_KEY_GLOW) || 'standard';
                    glowSelect.value = GLOW_PRESETS[savedGlow] ? savedGlow : 'standard';
                }
            }

            if (modeLightBtn) modeLightBtn.addEventListener('click', () => { setMode('light'); reflectUI(); });
            if (modeDarkBtn) modeDarkBtn.addEventListener('click', () => { setMode('dark'); reflectUI(); });
            if (accentSelect) {
                accentSelect.addEventListener('change', (e) => setAccent(e.target.value));
            }
            if (glowSelect) glowSelect.addEventListener('change', (e) => applyGlowPreset(e.target.value));

            // Initialize on load
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    applyGlowPreset(localStorage.getItem(STORAGE_KEY_GLOW) || 'standard');
                    reflectUI();
                }, { once: true });
            } else {
                applyGlowPreset(localStorage.getItem(STORAGE_KEY_GLOW) || 'standard');
                reflectUI();
            }

            // Keep legacy dropdown visually in sync when Auto follows system
            try {
                const media = window.matchMedia('(prefers-color-scheme: dark)');
                media.addEventListener('change', () => {
                    if (getMode() === 'auto') reflectUI();
                });
            } catch (e) { }
        })();
    </script>

</body>

</html>
